services:
  db:
    image: postgres:16-alpine
    container_name: agrotask_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: agrotask
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - agrotask_postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: agrotask_backend
    restart: unless-stopped
    depends_on:
      - db
    working_dir: /app
    volumes:
      - ./backend:/app
      - /app/node_modules
    env_file:
      - ./backend/.env
    ports:
      - "3001:3001"
    command: sh -c "npx prisma generate && npm run dev"

volumes:
  agrotask_postgres_data: